{% extends "base.html" %}
{% block title %}Contact - {{ college_name }} Event Portal{% endblock %}
{% block content %}
<section class="page-hero">
    <h1>Contact Us</h1>
    <p class="mt-2" style="color:var(--text-muted);">Reach the event management team at {{ college_name }}.</p>
</section>
<div class="info-grid">
    <div class="info-card"><h3>Address</h3><p class="mt-2" style="color:var(--text-muted);">{{ college_address }}</p></div>
    <div class="info-card"><h3>Email</h3><p class="mt-2"><a href="mailto:{{ college_email }}">{{ college_email }}</a></p></div>
    <div class="info-card"><h3>Phone</h3><p class="mt-2" style="color:var(--text-muted);">{{ college_phone }}</p></div>
</div>
{% endblock %}
