{% extends "base.html" %}

{% block title %}Admin Login - College Event Portal{% endblock %}

{% block extra_head %}
<style>
    .login-container {
        max-width: 420px;
        margin: 4rem auto;
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-label {
        display: block;
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        color: var(--text-main);
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        transition: var(--transition);
        background-color: #ffffff;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .login-btn {
        width: 100%;
        margin-top: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card">
        <h2 class="text-center mb-1">Admin Portal</h2>
        <p class="text-center mb-4" style="color: var(--text-muted); font-size: 0.9rem;">Sign in to manage events and view registrations.</p>
        
        <form action="{{ url_for('admin_login') }}" method="POST">
            <!-- Username -->
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
